kind = "web"
previewPath = "/"
title = "FUEGO ERRANTE — Official Site"
version = "1.0.0"
id = "artifacts/fuego-errante"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18257

[services.development]
run = "pnpm --filter @workspace/fuego-errante run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fuego-errante", "run", "build" ]
publicDir = "artifacts/fuego-errante/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18257"
BASE_PATH = "/"
